<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AwithO | Youth</title>
    <style>
        /* This makes it look like a dark terminal screen */
        body { 
            background-color: #0d1117; 
            color: #c9d1d9; 
            font-family: 'Courier New', Courier, monospace; 
            text-align: center; 
            padding: 50px 20px;
            margin: 0;
        }

        /* The Red Rose/Anarchist color */
        h1 { 
            color: #f85149; 
            font-size: 3.5em; 
            letter-spacing: 12px; 
            margin-bottom: 10px;
        }

        /* The secret symbol */
        .symbol { 
            font-size: 6em; 
            margin: 0; 
            color: #ffffff; 
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        /* The manifesto box */
        .manifesto { 
            max-width: 650px; 
            margin: 40px auto; 
            line-height: 1.8; 
            border: 1px solid #30363d; 
            padding: 30px;
            background-color: #161b22;
            border-radius: 5px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .status {
            color: #3fb950; /* Green for "Operational" */
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        hr {
            border: 0;
            border-top: 1px solid #30363d;
            margin: 30px 0;
        }

        p {
            font-size: 1.1em;
        }

        footer {
            margin-top: 50px;
            font-size: 0.8em;
            color: #8b949e;
        }
    </style>
</head>
<body>

    <div class="symbol">Ⓐ</div>
    <h1>AWITHO</h1>

    <div class="manifesto">
        <p>SYSTEM STATUS: <span class="status">OPERATIONAL</span></p>
        <hr>
        <p>This is a secure space for student autonomy. We aren't here to ask for permission; we're here to build a better way.</p>
        <p><em>"The Rose blooms in the concrete."</em></p>
    </div>

    <footer>
        [ CONNECTION ENCRYPTED ]<br>
        Established 2026
    </footer>

</body>
</html>
