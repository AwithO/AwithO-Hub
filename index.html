<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOUTH // AWITHO</title>
    <style>
        :root {
            --bg: #0d1117;
            --accent: #f85149;
            --text: #c9d1d9;
            --white: #ffffff;
            --green: #238636;
        }

        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 600px; padding: 20px; width: 100%; }
        .label { color: var(--accent); font-weight: bold; letter-spacing: 3px; font-size: 0.8rem; margin-bottom: 10px; }
        h1 { font-size: 3.5rem; margin: 0 0 20px 0; color: var(--white); letter-spacing: -2px; }

        /* --- POST BOX STYLES --- */
        .custom-post-box {
            background: #161b22;
            border: 1px solid #30363d;
            padding: 20px;
            margin-bottom: 30px;
            box-sizing: border-box;
        }

        .input-row { display: flex; gap: 10px; margin-bottom: 10px; }
        
        input[type="text"] {
            background: #0d1117;
            border: 1px solid #30363d;
            color: var(--white);
            padding: 8px;
            font-family: monospace;
            width: 150px;
        }

        textarea {
            width: 100%;
            background: #0d1117;
            border: 1px solid #30363d;
            color: #e6edf3;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            resize: vertical;
            min-height: 80px;
            box-sizing: border-box;
            outline: none;
        }

        .submit-btn {
            background: var(--green);
            color: white;
            border: none;
            padding: 10px 20px;
            margin-top: 10px;
            cursor: pointer;
            font-family: monospace;
            font-weight: bold;
        }

        /* --- POST FEED STYLES --- */
        .post {
            background: #0d1117;
            border: 1px solid #30363d;
            padding: 15px;
            margin-bottom: 15px;
            position: relative;
        }

        .post-header { color: #3fb950; font-size: 0.8rem; margin-bottom: 8px; }
        .reply-link { color: #ff3e3e; text-decoration: none; font-weight: bold; }
        .btn-reply { 
            font-size: 0.7rem; 
            color: #8b949e; 
            cursor: pointer; 
            margin-left: 10px; 
            text-decoration: underline; 
        }

        .footer { margin-top: 60px; font-size: 0.7rem; opacity: 0.4; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <h1>YOUTH AWITHO</h1>
        
        <div class="custom-post-box">
            <div class="label">// INPUT_INTEL</div>
            <form id="anonymous-form" target="hidden_iframe">
                <div class="input-row">
                    <input type="text" id="name-input" placeholder="Handle (Optional)">
                </div>
                <textarea id="message-input" placeholder="Type message... Use >>[ID] to reply" required></textarea>
                <button type="submit" class="submit-btn">POST_TO_THE_WIRE</button>
            </form>
        </div>

        <div id="status-msg" style="color: var(--green); font-size: 0.8rem; margin-bottom: 10px; display: none;">[ DATA_SENT ]</div>

        <div class="label">// THE_WIRE_FEED</div>
        <div id="thread-feed"></div>

        <div class="footer">// NODE 01 // CLEARFIELD_UT // 2026</div>
    </div>

    <iframe name="hidden_iframe" id="hidden_iframe" src="about:blank" style="display:none;"></iframe>

    <script>
        let submitted = false;
        const formID = '1FAIpQLScEeVqtK5Xte46STQI2FrjH_dXvkrwCvZrI8t9V7BTeuJ1otA';
        const entryID = 'entry.633833791';
        const sheetCSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQIhnfqfgTI4yUcwdXVSEA0oIgmHRJ0SkXnqMV7vEZCl2DXDzTZDHa8UnXYkmjzQQ-_7DSnFyy0c14q/pub?output=csv';

        const formElement = document.getElementById('anonymous-form');
        const inputElement = document.getElementById('message-input');
        const nameElement = document.getElementById('name-input');

        formElement.addEventListener('submit', function(e) {
            e.preventDefault();
            const name = nameElement.value || "Anonymous";
            const msg = `[${name}] ${inputElement.value}`; // Wrap name in brackets so we can parse it
            
            const googleUrl = `https://docs.google.com/forms/d/e/${formID}/formResponse?${entryID}=${encodeURIComponent(msg)}&submit=Submit`;
            
            submitted = true;
            document.getElementById('hidden_iframe').src = googleUrl;
            document.getElementById('status-msg').style.display = 'block';
        });

        document.getElementById('hidden_iframe').onload = function() {
            if (submitted) {
                inputElement.value = '';
                nameElement.value = '';
                submitted = false;
                setTimeout(() => { 
                    document.getElementById('status-msg').style.display = 'none'; 
                    loadThreads(); 
                }, 1000);
            }
        };

        function setReply(id) {
            inputElement.value = `>>${id} ` + inputElement.value;
            inputElement.focus();
        }

        async function loadThreads() {
            try {
                const response = await fetch(sheetCSV + '?t=' + new Date().getTime());
                const data = await response.text();
                const rows = data.split('\n').filter(r => r.trim() !== '').slice(1);
                const feed = document.getElementById('thread-feed');
                feed.innerHTML = '';

                rows.reverse().forEach((row, index) => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length < 2) return;

                    let rawMsg = cols[1].replace(/"/g, '');
                    let posterName = "Anonymous";

                    // Extract name from brackets if it exists
                    if (rawMsg.startsWith('[')) {
                        const endBracket = rawMsg.indexOf(']');
                        posterName = rawMsg.substring(1, endBracket);
                        rawMsg = rawMsg.substring(endBracket + 1);
                    }

                    // Convert >>ID into a red link
                    const formattedMsg = rawMsg.replace(/>>(\d+)/g, '<span class="reply-link">>>$1</span>');
                    const postID = rows.length - index;

                    feed.innerHTML += `
                        <div class="post" id="p${postID}">
                            <div class="post-header">
                                <span style="color:var(--white)">${posterName}</span> 
                                <span>#${postID}</span>
                                <span class="btn-reply" onclick="setReply(${postID})">[Reply]</span>
                            </div>
                            <div class="post-body">${formattedMsg}</div>
                        </div>
                    `;
                });
            } catch (e) { console.error(e); }
        }

        loadThreads();
        setInterval(loadThreads, 30000);
    </script>
</body>
</html>
