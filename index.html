<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOUTH // AWITHO</title>
    <style>
        :root {
            --bg: #000000;
            --accent: #ff0000;
            --text: #ffffff;
            --muted: #444444;
        }

        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .frame {
            border: 1px solid var(--muted);
            padding: 40px;
            max-width: 500px;
            position: relative;
        }

        .glitch-text {
            font-size: 0.8rem;
            color: var(--accent);
            position: absolute;
            top: 10px;
            left: 15px;
            letter-spacing: 3px;
        }

        h1 {
            font-size: 3rem;
            margin: 20px 0;
            text-transform: uppercase;
            border-bottom: 8px solid var(--accent);
            display: inline-block;
        }

        .msg {
            line-height: 1.6;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .highlight {
            background-color: var(--text);
            color: var(--bg);
            padding: 0 5px;
        }

        .footer-code {
            font-size: 0.7rem;
            color: var(--muted);
            text-align: right;
            margin-top: 20px;
        }

        /* Subtle flicker effect */
        @keyframes flicker {
            0% { opacity: 1; }
            50% { opacity: 0.9; }
            100% { opacity: 1; }
        }
        .frame { animation: flicker 0.1s infinite alternate; }
    </style>
</head>
<body>

    <div class="frame">
        <div class="glitch-text">SGNL_RCVD_2026</div>
        
        <h1>YOUTH.</h1>
        
        <div class="msg">
            THEY TOLD US TO WAIT OUR TURN. <br>
            <span class="highlight">WE DECIDED NOT TO.</span> <br><br>
            THIS IS NOT A CLUB. <br>
            THIS IS NOT A CLASS. <br>
            THIS IS AN AUTONOMOUS ZONE.
        </div>

        <div class="footer-code">
            [ ENCRYPTED NODE: AWITHO.XYZ ] <br>
            [ STATUS: UNBOUND ]
        </div>
    </div>

</body>
</html>
